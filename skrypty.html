<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skrypty - Grzesiu APPs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  // TODO: Replace with your Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.collection = collection;
  window.getDocs = getDocs;
</script>

<style>
html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root {
  --bg: linear-gradient(-45deg,#8b0000,#ff4500,#ff6347,#b22222);
  --text: #ffffff;
  --header-bg: rgba(0,0,0,0.3);
  --card-bg: rgba(0,0,0,0.55);
  --card-border: rgba(255,107,53,0.45);
  --nav-color: #d0a080;
  --nav-hover: #ff6b35;
  --nav-hover-bg: rgba(255,107,53,0.15);
  --logo-gradient: linear-gradient(45deg,#ff6b35,#ffb347);
  --p-color: #f9f1d4;
  --pre-bg: rgba(0,0,0,0.75);
  --pre-color: #e8e4c5;
  --script-bg: rgba(255,255,255,0.08);
  --script-border: rgba(255,107,53,0.35);
  --script-h2: #ff6b35;
  --script-p: #d0a080;
  --script-date: #bbb;
  --executor-bg: rgba(0,0,0,0.08);
  --executor-border: rgba(255,107,53,0.35);
  --download-btn-bg: linear-gradient(45deg,#ff6b35,#ffb347);
  --download-btn-shadow: rgba(255,107,53,0.5);
  --download-btn-shadow-hover: rgba(255,107,53,0.8);
}
.dark-mode {
  --bg: linear-gradient(-45deg, #040404, #0b1a2b, #10171f, #020405);
  --text: #f4feff;
  --header-bg: rgba(0,0,0,0.65);
  --card-bg: rgba(0,0,0,0.55);
  --card-border: rgba(0,120,0,0.45);
  --nav-color: #90ee90;
  --nav-hover: #00ff9d;
  --nav-hover-bg: rgba(0,100,0,0.2);
  --logo-gradient: linear-gradient(45deg,#006400,#32cd32);
  --p-color: #f0e68c;
  --pre-bg: rgba(0,0,0,0.75);
  --pre-color: #e8e4c5;
  --script-bg: rgba(255,255,255,0.08);
  --script-border: rgba(0,100,0,0.35);
  --script-h2: #006400;
  --script-p: #90ee90;
  --script-date: #bbb;
  --executor-bg: rgba(255,255,255,0.08);
  --executor-border: rgba(0,100,0,0.35);
  --download-btn-bg: linear-gradient(45deg,#006400,#32cd32);
  --download-btn-shadow: rgba(0,100,0,0.5);
  --download-btn-shadow-hover: rgba(0,100,0,0.8);
}
body{color:var(--text);background:var(--bg);background-size:400% 400%;background-position:0% 0%;transition:background-position 0.05s ease-out;min-height:100vh;}
.theme-wipe {position: fixed; inset: 0; background: rgba(0,0,0,0.85); pointer-events: none; z-index: 9999; transform: translateX(-100%);}
.theme-wipe.slide-to-dark {animation: wipe-right 0.5s ease forwards;}
.theme-wipe.slide-to-light {animation: wipe-left 0.5s ease forwards;}

@keyframes wipe-right {0%{transform:translateX(-100%);}50%{transform:translateX(0);}100%{transform:translateX(100%);}}
@keyframes wipe-left {0%{transform:translateX(100%);}50%{transform:translateX(0);}100%{transform:translateX(-100%);}}

header{display:flex;justify-content:space-between;align-items:center;padding:20px 10%;backdrop-filter:blur(8px);background:var(--header-bg);position:fixed;width:100%;top:0;z-index:100;}
.logo{font-size:22px;font-weight:700;background:var(--logo-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
nav a{margin-left:25px;text-decoration:none;color:var(--nav-color);transition:0.3s;padding:5px 10px;border-radius:5px;}
nav a:hover, nav a.active{color:var(--nav-hover);background:var(--nav-hover-bg);}
nav{background:transparent;}
.logo, nav a { text-decoration:none !important; }
.main{padding:120px 10%;}
.card{background:var(--card-bg);border:2px solid var(--card-border);border-radius:15px;padding:30px;backdrop-filter:blur(10px);}
.card h1{color:var(--text);margin-bottom:15px;text-shadow: 0 0 8px rgba(0,0,0,0.8);}
.card p{color:var(--p-color);line-height:1.6;text-shadow: 0 0 6px rgba(0,0,0,0.7);}
.card pre{background:rgba(0,0,0,0.75);padding:15px;border-radius:10px;overflow:auto;color:var(--pre-color);}
.download-btn{display:inline-block;margin-top:15px;padding:10px 20px;background:var(--download-btn-bg);color:#fff;text-decoration:none;border-radius:8px;transition:0.3s;box-shadow:0 0 10px var(--download-btn-shadow);}
.download-btn:hover{transform:scale(1.05);box-shadow:0 0 15px var(--download-btn-shadow-hover);}
.executor-block{background:var(--executor-bg);border:1px solid var(--executor-border);border-radius:12px;padding:20px;margin-top:20px;margin-bottom:20px;text-align:center;backdrop-filter:blur(5px);}
.script-item{background:var(--script-bg);border:1px solid var(--script-border);border-radius:12px;margin-bottom:18px;padding:14px;}
.script-item h2{color:var(--script-h2);margin:0 0 10px;}
.script-item p{margin:0 0 10px;color:var(--script-p);}
.script-item pre{background:var(--pre-bg);border-radius:8px;padding:12px;overflow:auto;color:var(--pre-color);}
.script-item .date{font-size:0.85rem;color:var(--script-date);margin-top:8px;}
</style>
</head>
<body>
<div id="theme-wipe" class="theme-wipe"></div>
<header>
<a class="logo" href="index.html">⚡ Grzesiu APPs</a>
<nav>
<a href="index.html">Strona Główna</a>
<button id="theme-toggle" style="margin-left:25px; background:none; border:none; color:var(--nav-color); font-size:20px; cursor:pointer;">🌙</button>
</nav>
</header>
<div class="main">
<div class="card">
<h1>Skrypty do roblox</h1>
<p>Dodaj skrypty w panelu admina, a tutaj zobaczysz ich listę i treść.</p>
<div class="executor-block">
<p>Jeżeli nie masz executora to go pobierz klikając przycisk poniżej</p>
<a href="https://wrdcdn.net/r/2/1774298529238/Xeno-v1.3.25b.zip" class="download-btn">Pobrać Executor</a>
</div>
<div id="scriptsContainer"></div>
</div>
</div>
<script>
async function getScripts() {
  try {
    const querySnapshot = await getDocs(collection(db, "scripts"));
    const scripts = [];
    querySnapshot.forEach((doc) => {
      scripts.push(doc.data());
    });
    return scripts;
  } catch (error) {
    console.error("Error getting scripts: ", error);
    return [];
  }
}

async function renderScripts() {
  const scripts = await getScripts();
  const container = document.getElementById('scriptsContainer');

  if(!scripts.length) {
    container.innerHTML = '<p>Brak skryptów. Dodaj nowy skrypt w <a href="admin.html" style="color:#ffb347;">panelu Admin</a>.</p>';
    return;
  }

  container.innerHTML = scripts.map(script => `
    <div class="script-item">
      <h2>${script.name}</h2>
      <p>${script.desc}</p>
      <pre>${escapeHtml(script.code)}</pre>
      <p class="date">Data: ${script.date || ''}</p>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const p = document.createElement('p');
  p.textContent = text;
  return p.innerHTML;
}

window.addEventListener('DOMContentLoaded', async () => {
  await renderScripts();
});

document.addEventListener('mousemove', e => {
  const xPercent = (e.clientX / window.innerWidth) * 100;
  const yPercent = (e.clientY / window.innerHeight) * 100;
  document.body.style.backgroundPosition = `${xPercent}% ${yPercent}%`;
});

const themeToggle = document.getElementById('theme-toggle');
const themeWipe = document.getElementById('theme-wipe');

function setTheme(dark) {
  if (dark) {
    document.body.classList.add('dark-mode');
    themeToggle.textContent = '☀️';
    localStorage.setItem('theme', 'dark');
  } else {
    document.body.classList.remove('dark-mode');
    themeToggle.textContent = '🌙';
    localStorage.setItem('theme', 'light');
  }
}

function initTheme() {
  const theme = localStorage.getItem('theme');
  setTheme(theme === 'dark');
}

themeToggle.addEventListener('click', () => {
  const toDark = !document.body.classList.contains('dark-mode');
  themeWipe.classList.remove('slide-to-dark', 'slide-to-light');
  themeWipe.classList.add(toDark ? 'slide-to-dark' : 'slide-to-light');

  setTimeout(() => {
    setTheme(toDark);
  }, 250);

  themeWipe.addEventListener('animationend', () => {
    themeWipe.classList.remove('slide-to-dark', 'slide-to-light');
  }, { once: true });
});

document.addEventListener('DOMContentLoaded', initTheme);
</script>
</body>
</html>
