<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Grzesiu APPs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
html{
scroll-behavior:smooth;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
color:#ffffff;
background: linear-gradient(-45deg, #8b0000, #ff4500, #ff6347, #b22222);
background-size:400% 400%;
transition: background-position 0.05s ease-out;
min-height: 100vh;
}

/* LOGIN PAGE */
.login-container{
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.8);
backdrop-filter: blur(5px);
display: none;
justify-content: center;
align-items: center;
z-index: 1000;
opacity: 0;
transition: opacity 0.4s ease;
}

.login-container.active{
display: flex;
opacity: 1;
}

.login-box{
background: rgba(0, 0, 0, 0.5);
backdrop-filter: blur(10px);
border: 2px solid rgba(255, 107, 53, 0.5);
border-radius: 15px;
padding: 50px;
max-width: 400px;
width: 100%;
animation: slideUp 0.6s ease-out;
transform-origin: center;
}

.login-box.shake{
animation: shake 0.5s ease-in-out;
}

.login-box.fadeOut{
animation: fadeOut 0.4s ease-out forwards;
}

.login-box h2{
font-size: 2rem;
margin-bottom: 30px;
text-align: center;
color: #ff6b35;
}

.form-group{
margin-bottom: 20px;
}

.form-group label{
display: block;
margin-bottom: 8px;
color: #d0a080;
font-weight: 600;
}

.form-group input{
width: 100%;
padding: 12px;
background: rgba(255, 107, 53, 0.1);
border: 1px solid rgba(255, 107, 53, 0.3);
border-radius: 8px;
color: #ffffff;
font-size: 1rem;
transition: all 0.3s ease;
}

.form-group input:focus{
outline: none;
background: rgba(255, 107, 53, 0.2);
border-color: rgba(255, 107, 53, 0.8);
box-shadow: 0 0 15px rgba(255, 107, 53, 0.4);
}

.form-group input::placeholder{
color: rgba(255, 255, 255, 0.5);
}

.login-btn{
width: 100%;
padding: 14px;
background: #ff4500;
border: none;
border-radius: 8px;
color: white;
font-weight: 600;
font-size: 1rem;
cursor: pointer;
transition: all 0.3s ease;
margin-top: 10px;
}

.login-btn:hover{
background: #ff5c1a;
box-shadow: 0 0 30px rgba(255, 69, 0, 0.6);
transform: scale(1.02);
}

.error-msg{
background: rgba(255, 0, 0, 0.2);
border: 1px solid rgba(255, 0, 0, 0.5);
color: #ff6b6b;
padding: 12px;
border-radius: 8px;
margin-bottom: 20px;
display: none;
}

.error-msg.show{
display: block;
}

/* ADMIN PANEL */
.admin-container{
display: none;
padding: 20px;
opacity: 0;
transition: opacity 0.4s ease;
}

.admin-container.active{
display: block;
opacity: 1;
}

header{
display: flex;
justify-content: space-between;
align-items: center;
padding: 20px;
backdrop-filter: blur(8px);
background: rgba(0, 0, 0, 0.3);
border-bottom: 1px solid rgba(255, 107, 53, 0.3);
border-radius: 10px;
margin-bottom: 30px;
animation: slideDown 0.6s ease-out;
}

.logo-admin{
font-size: 20px;
font-weight: 700;
color: #ff6b35;
}

.logout-btn{
padding: 10px 20px;
background: #d32f2f;
border: none;
border-radius: 8px;
color: white;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
}

.logout-btn:hover{
background: #ff4444;
box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
}

.admin-content{
max-width: 1200px;
margin: 0 auto;
animation: fadeInUp 0.6s ease-out 0.2s both;
}

.section-title{
font-size: 2rem;
color: #ff6b35;
margin-bottom: 30px;
margin-top: 40px;
}

.add-project-form{
background: rgba(0, 0, 0, 0.4);
border: 2px solid rgba(255, 107, 53, 0.3);
border-radius: 15px;
padding: 30px;
margin-bottom: 40px;
backdrop-filter: blur(10px);
}

.form-row{
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 20px;
}

.form-row.full{
grid-template-columns: 1fr;
}

.form-group-admin{
display: flex;
flex-direction: column;
}

.form-group-admin label{
margin-bottom: 8px;
color: #d0a080;
font-weight: 600;
}

.form-group-admin input,
.form-group-admin textarea{
padding: 12px;
background: rgba(255, 107, 53, 0.1);
border: 1px solid rgba(255, 107, 53, 0.3);
border-radius: 8px;
color: #ffffff;
font-size: 1rem;
font-family: 'Inter', sans-serif;
transition: all 0.3s ease;
}

.form-group-admin textarea{
resize: vertical;
min-height: 100px;
}

.form-group-admin input:focus,
.form-group-admin textarea:focus{
outline: none;
background: rgba(255, 107, 53, 0.2);
border-color: rgba(255, 107, 53, 0.8);
box-shadow: 0 0 15px rgba(255, 107, 53, 0.4);
}

.add-btn{
padding: 14px 30px;
background: #4CAF50;
border: none;
border-radius: 8px;
color: white;
font-weight: 600;
font-size: 1rem;
cursor: pointer;
transition: all 0.3s ease;
margin-top: 10px;
}

.add-btn:hover{
background: #45a049;
box-shadow: 0 0 30px rgba(76, 175, 80, 0.6);
transform: scale(1.02);
}

.projects-list{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 25px;
}

.project-item{
background: rgba(0, 0, 0, 0.4);
border: 2px solid rgba(255, 107, 53, 0.3);
border-radius: 15px;
padding: 25px;
backdrop-filter: blur(10px);
transition: all 0.3s ease;
}

.project-item:hover{
transform: translateY(-5px);
border-color: rgba(255, 179, 71, 0.8);
box-shadow: 0 10px 40px rgba(255, 107, 53, 0.3);
}

.project-item h4{
color: #ff6b35;
margin-bottom: 10px;
font-size: 1.3rem;
}

.project-item p{
color: #d0a080;
margin-bottom: 15px;
font-size: 0.95rem;
}

.project-actions{
display: flex;
gap: 10px;
}

.edit-btn, .delete-btn{
padding: 8px 15px;
border: none;
border-radius: 6px;
cursor: pointer;
font-weight: 600;
transition: all 0.3s ease;
flex: 1;
}

.edit-btn{
background: #2196F3;
color: white;
}

.edit-btn:hover{
background: #0b7dda;
box-shadow: 0 0 15px rgba(33, 150, 243, 0.6);
}

.delete-btn{
background: #d32f2f;
color: white;
}

.delete-btn:hover{
background: #ff4444;
box-shadow: 0 0 15px rgba(211, 47, 47, 0.6);
}

.empty-state{
text-align: center;
padding: 60px 20px;
color: #d0a080;
font-size: 1.1rem;
}

.success-msg{
background: rgba(76, 175, 80, 0.2);
border: 1px solid rgba(76, 175, 80, 0.5);
color: #90EE90;
padding: 12px;
border-radius: 8px;
margin-bottom: 20px;
display: none;
}

.success-msg.show{
display: block;
}

@keyframes slideUp {
    from {
        transform: translateY(50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes fadeInUp {
    from {
        transform: translateY(30px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes fadeOut {
    from {
        transform: scale(1) translateY(0);
        opacity: 1;
    }
    to {
        transform: scale(0.8) translateY(-50px);
        opacity: 0;
    }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
    20%, 40%, 60%, 80% { transform: translateX(10px); }
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->
<div class="login-container active" id="loginContainer">
<div class="login-box">
<h2>🔐 Admin Login</h2>
<div class="error-msg" id="errorMsg"></div>
<div class="form-group">
<label>Login:</label>
<input type="text" id="username" placeholder="Wpisz login" autocomplete="off">
</div>
<div class="form-group">
<label>Hasło:</label>
<input type="password" id="password" placeholder="Wpisz hasło">
</div>
<button class="login-btn" onclick="login()">Zaloguj się</button>
<p style="text-align: center; margin-top: 20px; color: #d0a080; font-size: 0.85rem;">
Demo: login: <strong>admin</strong> | hasło: <strong>admin123</strong>
</p>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-container" id="adminContainer">
<header>
<a class="logo-admin" href="index.html">⚡ Admin Panel - Grzesiu APPs</a>
<button class="logout-btn" onclick="logout()">Wyloguj się</button>
</header>

<div class="admin-content">
<!-- ADD PROJECT SECTION -->
<div class="section-title">➕ Dodaj Nowy Projekt</div>

<div class="add-project-form">
<div class="success-msg" id="successMsg"></div>

<div class="form-row">
<div class="form-group-admin">
<label>Emoji / Ikona:</label>
<input type="text" id="projectEmoji" placeholder="np. 🚀" value="🚀" maxlength="2">
</div>
<div class="form-group-admin">
<label>Nazwa Projektu:</label>
<input type="text" id="projectName" placeholder="np. Projekt 1">
</div>
</div>

<div class="form-row full">
<div class="form-group-admin">
<label>Opis:</label>
<textarea id="projectDesc" placeholder="Wpisz opis projektu"></textarea>
</div>
</div>

<div class="form-row">
<div class="form-group-admin">
<label>Link (opcjonalnie):</label>
<input type="text" id="projectLink" placeholder="https://...">
</div>
</div>

<button class="add-btn" onclick="addProject()">Dodaj Projekt</button>
</div>

<!-- PROJECTS LIST -->
<div class="section-title">📋 Twoje Projekty</div>
<div class="projects-list" id="projectsList">
<div class="empty-state">Brak projektów. Dodaj swój pierwszy projekt!</div>
</div>

<!-- SCRIPTS SECTION -->
<div class="section-title">💻 Zarządzanie Skryptami</div>
<div class="add-project-form" style="padding-top: 20px;">
<div class="success-msg" id="scriptSuccessMsg"></div>

<div class="form-row">
<div class="form-group-admin">
<label>Nazwa skryptu:</label>
<input type="text" id="scriptName" placeholder="np. Auto-fill form">
</div>
<div class="form-group-admin">
<label>Opis skryptu:</label>
<input type="text" id="scriptDesc" placeholder="Krótki opis">
</div>
</div>

<div class="form-row full">
<div class="form-group-admin">
<label>Treść skryptu (JS):</label>
<textarea id="scriptCode" placeholder="np. function test(){...}"></textarea>
</div>
</div>

<button class="add-btn" onclick="addScript()">Dodaj Skrypt</button>
</div>

<div class="section-title">📄 Twoje Skrypty</div>
<div class="projects-list" id="scriptsList">
<div class="empty-state">Brak skryptów. Dodaj swój pierwszy skrypt!</div>
</div>

</div>
</div>

<script>
// Dane testowe
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin123';

// Inicjalizacja
document.addEventListener('DOMContentLoaded', function() {
  checkLoginStatus();
  loadProjects();
  loadScripts();
  
  // Enter w polu hasła
  document.getElementById('password').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') login();
  });
});

// LOGIN FUNCTION
function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  
  if(!username || !password) {
    showError('Wpisz login i hasło!');
    return;
  }
  
  if(username === ADMIN_USER && password === ADMIN_PASS) {
    localStorage.setItem('adminLogged', 'true');
    showAdminPanel();
    clearLoginForms();
  } else {
    showError('Błędny login lub hasło!');
    document.getElementById('password').value = '';
  }
}

function showError(msg) {
  const errorMsg = document.getElementById('errorMsg');
  const loginBox = document.querySelector('.login-box');
  
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
  
  // Potrząsanie box'a
  loginBox.classList.add('shake');
  setTimeout(() => {
    loginBox.classList.remove('shake');
  }, 500);
  
  setTimeout(() => {
    errorMsg.classList.remove('show');
  }, 3000);
}

function showSuccess(msg) {
  const successMsg = document.getElementById('successMsg');
  successMsg.textContent = msg;
  successMsg.classList.add('show');
  setTimeout(() => {
    successMsg.classList.remove('show');
  }, 3000);
}

// LOGOUT FUNCTION
function logout() {
  localStorage.removeItem('adminLogged');
  showLoginPage();
  clearLoginForms();
}

// Eksport projektów do pliku JSON
function downloadProjectsFile() {
  const projects = getProjects();
  const dataStr = JSON.stringify(projects, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'projects.json';
  a.click();
  URL.revokeObjectURL(url);
}

// CHECK LOGIN STATUS
function checkLoginStatus() {
  if(localStorage.getItem('adminLogged') === 'true') {
    showAdminPanel();
  } else {
    showLoginPage();
  }
}

function showLoginPage() {
  const loginContainer = document.getElementById('loginContainer');
  const adminContainer = document.getElementById('adminContainer');
  
  adminContainer.classList.remove('active');
  
  setTimeout(() => {
    loginContainer.classList.add('active');
  }, 100);
}

function showAdminPanel() {
  const loginBox = document.querySelector('.login-box');
  const loginContainer = document.getElementById('loginContainer');
  const adminContainer = document.getElementById('adminContainer');
  
  loginBox.classList.add('fadeOut');
  
  setTimeout(() => {
    loginContainer.classList.remove('active');
    adminContainer.classList.add('active');
    loginBox.classList.remove('fadeOut');
  }, 400);
}

function clearLoginForms() {
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// ADD PROJECT
function addProject() {
  const emoji = document.getElementById('projectEmoji').value || '📌';
  const name = document.getElementById('projectName').value.trim();
  const desc = document.getElementById('projectDesc').value.trim();
  const link = document.getElementById('projectLink').value.trim();
  
  if(!name || !desc) {
    showError('Wpisz nazwę i opis projektu!');
    return;
  }
  
  const projects = getProjects();
  const newProject = {
    id: Date.now(),
    emoji,
    name,
    desc,
    link,
    date: new Date().toLocaleDateString('pl-PL')
  };
  
  projects.push(newProject);
  localStorage.setItem('projects', JSON.stringify(projects));
  
  // Clear form
  document.getElementById('projectEmoji').value = '🚀';
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  document.getElementById('projectLink').value = '';
  
  showSuccess('✅ Projekt został dodany!');
  loadProjects();
}

// SCRIPTS HANDLERS
function getScripts() {
  const data = localStorage.getItem('scripts');
  return data ? JSON.parse(data) : [];
}

function loadScripts() {
  const scripts = getScripts();
  const list = document.getElementById('scriptsList');
  if(!list) return;

  if(scripts.length === 0) {
    list.innerHTML = '<div class="empty-state">Brak skryptów. Dodaj swój pierwszy skrypt!</div>';
    return;
  }

  list.innerHTML = scripts.map(script => `
    <div class="project-item">
      <h4>🛠 ${script.name}</h4>
      <p>${script.desc}</p>
      <pre style="background: rgba(0,0,0,0.6); border-radius: 8px; padding: 12px; white-space: pre-wrap;">${escapeHtml(script.code)}</pre>
      <div class="project-actions">
        <button class="edit-btn" onclick="editScript(${script.id})">✏️ Edytuj</button>
        <button class="delete-btn" onclick="deleteScript(${script.id})">🗑️ Usuń</button>
      </div>
    </div>
  `).join('');
}

function addScript() {
  const name = document.getElementById('scriptName').value.trim();
  const desc = document.getElementById('scriptDesc').value.trim();
  const code = document.getElementById('scriptCode').value.trim();

  if(!name || !desc || !code) {
    showError('Wypełnij wszystkie pola skryptu!');
    return;
  }

  const scripts = getScripts();
  scripts.push({
    id: Date.now(),
    name,
    desc,
    code,
    date: new Date().toLocaleDateString('pl-PL')
  });

  localStorage.setItem('scripts', JSON.stringify(scripts));
  document.getElementById('scriptName').value = '';
  document.getElementById('scriptDesc').value = '';
  document.getElementById('scriptCode').value = '';

  const scriptSuccess = document.getElementById('scriptSuccessMsg');
  scriptSuccess.textContent = '✅ Skrypt został dodany!';
  scriptSuccess.classList.add('show');
  setTimeout(() => scriptSuccess.classList.remove('show'), 3000);

  loadScripts();
}

function editScript(id) {
  const scripts = getScripts();
  const script = scripts.find(s => s.id === id);
  if(!script) return;
  document.getElementById('scriptName').value = script.name;
  document.getElementById('scriptDesc').value = script.desc;
  document.getElementById('scriptCode').value = script.code;
  deleteScript(id, false);
}

function deleteScript(id, showMsg = true) {
  let scripts = getScripts();
  scripts = scripts.filter(s => s.id !== id);
  localStorage.setItem('scripts', JSON.stringify(scripts));
  if(showMsg) showSuccess('✅ Skrypt został usunięty!');
  loadScripts();
}

function saveScriptsFile() {
  const scripts = getScripts();
  const dataStr = JSON.stringify(scripts, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'scripts.json';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(text) {
  const p = document.createElement('p');
  p.textContent = text;
  return p.innerHTML;
}

// GET PROJECTS
function getProjects() {
  const data = localStorage.getItem('projects');
  return data ? JSON.parse(data) : [];
}

// LOAD PROJECTS
function loadProjects() {
  const projects = getProjects();
  const list = document.getElementById('projectsList');
  
  if(projects.length === 0) {
    list.innerHTML = '<div class="empty-state">Brak projektów. Dodaj swój pierwszy projekt!</div>';
    return;
  }
  
  list.innerHTML = projects.map(project => `
    <div class="project-item">
      <h4>${project.emoji} ${project.name}</h4>
      <p>${project.desc}</p>
      <p style="font-size: 0.85rem; color: #888; margin-bottom: 15px;">Dodano: ${project.date}</p>
      ${project.link ? `<p><a href="${project.link}" target="_blank" style="color: #ff6b35; text-decoration: none;">🔗 Otwórz Link</a></p>` : ''}
      <div class="project-actions">
        <button class="edit-btn" onclick="editProject(${project.id})">✏️ Edytuj</button>
        <button class="delete-btn" onclick="deleteProject(${project.id})">🗑️ Usuń</button>
      </div>
    </div>
  `).join('');
}

// EDIT PROJECT
function editProject(id) {
  const projects = getProjects();
  const project = projects.find(p => p.id === id);
  
  if(!project) return;
  
  document.getElementById('projectEmoji').value = project.emoji;
  document.getElementById('projectName').value = project.name;
  document.getElementById('projectDesc').value = project.desc;
  document.getElementById('projectLink').value = project.link || '';
  
  document.querySelector('.add-project-form').scrollIntoView({ behavior: 'smooth' });
  
  deleteProject(id, false);
}

// DELETE PROJECT
function deleteProject(id, showMsg = true) {
  if(!showMsg || confirm('Na pewno chcesz usunąć ten projekt?')) {
    let projects = getProjects();
    projects = projects.filter(p => p.id !== id);
    localStorage.setItem('projects', JSON.stringify(projects));
    
    if(showMsg) showSuccess('✅ Projekt został usunięty!');
    loadProjects();
  }
}

// Gradient z kursorem
document.addEventListener('mousemove', e => {
  const xPercent = (e.clientX / window.innerWidth) * 100;
  const yPercent = (e.clientY / window.innerHeight) * 100;
  document.body.style.backgroundPosition = `${xPercent}% ${yPercent}%`;
});
</script>

</body>
</html>
