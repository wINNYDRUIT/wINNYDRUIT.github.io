<script>
// Dane testowe
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin123';

// Inicjalizacja
document.addEventListener('DOMContentLoaded', async function() {
  checkLoginStatus();
  loadProjects();
  loadScripts();
  
  // Enter w polu hasła
  document.getElementById('password').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') login();
  });
});

// LOGIN FUNCTION
function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  
  if(!username || !password) {
    showError('Wpisz login i hasło!');
    return;
  }
  
  if(username === ADMIN_USER && password === ADMIN_PASS) {
    localStorage.setItem('adminLogged', 'true');
    showAdminPanel();
    clearLoginForms();
  } else {
    showError('Błędny login lub hasło!');
    document.getElementById('password').value = '';
  }
}

function showError(msg) {
  const errorMsg = document.getElementById('errorMsg');
  const loginBox = document.querySelector('.login-box');
  
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
  
  // Potrząsanie box'a
  loginBox.classList.add('shake');
  setTimeout(() => {
    loginBox.classList.remove('shake');
  }, 500);
  
  setTimeout(() => {
    errorMsg.classList.remove('show');
  }, 3000);
}

function showSuccess(msg) {
  const successMsg = document.getElementById('successMsg');
  successMsg.textContent = msg;
  successMsg.classList.add('show');
  setTimeout(() => {
    successMsg.classList.remove('show');
  }, 3000);
}

// LOGOUT FUNCTION
function logout() {
  localStorage.removeItem('adminLogged');
  showLoginPage();
  clearLoginForms();
}

// Eksport projektów do pliku JSON
async function downloadProjectsFile(showNotification = true) {
  try {
    const projects = getProjects();
    const data = JSON.stringify(projects, null, 2);
    const blob = new Blob([data], {type: 'application/json'});

    if ('showSaveFilePicker' in window) {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'projects.json',
        types: [{
          description: 'JSON file',
          accept: {'application/json': ['.json']}
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      if (showNotification) showSuccess('✅ Plik projects.json został zapisany!');
    } else {
      // Fallback to download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'projects.json';
      a.click();
      URL.revokeObjectURL(url);
      if (showNotification) showSuccess('✅ Plik projects.json został pobrany!');
    }
  } catch (error) {
    console.error('Error saving file:', error);
    if (error && (error.name === 'AbortError' || error.name === 'SecurityError')) {
      return;
    }
    showError('Błąd podczas zapisywania pliku!');
  }
}

function downloadFile(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// CHECK LOGIN STATUS
function checkLoginStatus() {
  if(localStorage.getItem('adminLogged') === 'true') {
    showAdminPanel();
  } else {
    showLoginPage();
  }
}

function showLoginPage() {
  const loginContainer = document.getElementById('loginContainer');
  const adminContainer = document.getElementById('adminContainer');
  
  adminContainer.classList.remove('active');
  
  setTimeout(() => {
    loginContainer.classList.add('active');
  }, 100);
}

function showAdminPanel() {
  const loginBox = document.querySelector('.login-box');
  const loginContainer = document.getElementById('loginContainer');
  const adminContainer = document.getElementById('adminContainer');
  
  loginBox.classList.add('fadeOut');
  
  setTimeout(() => {
    loginContainer.classList.remove('active');
    adminContainer.classList.add('active');
    loginBox.classList.remove('fadeOut');
  }, 400);
}

function clearLoginForms() {
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// ADD PROJECT
function addProject() {
  const emoji = document.getElementById('projectEmoji').value || '📌';
  const name = document.getElementById('projectName').value.trim();
  const desc = document.getElementById('projectDesc').value.trim();
  const link = document.getElementById('projectLink').value.trim();
  const editId = document.getElementById('editId').value;
  
  if(!name || !desc) {
    showError('Wpisz nazwę i opis projektu!');
    return;
  }
  
  const projects = getProjects();
  
  if(editId) {
    // Edit existing
    const project = projects.find(p => p.id === editId);
    if(project) {
      project.emoji = emoji;
      project.name = name;
      project.desc = desc;
      project.link = link;
    }
    document.getElementById('editId').value = '';
  } else {
    // Add new
    const newProject = {
      id: Date.now().toString(),
      emoji,
      name,
      desc,
      link,
      date: new Date().toLocaleDateString('pl-PL')
    };
    projects.push(newProject);
  }
  
  localStorage.setItem('projects', JSON.stringify(projects));
  
  // Clear form
  document.getElementById('projectEmoji').value = '🚀';
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  document.getElementById('projectLink').value = '';
  
  showSuccess(editId ? '✅ Projekt został zaktualizowany!' : '✅ Projekt został dodany!');
  loadProjects();
}

// SCRIPTS HANDLERS
function getScripts() {
  return JSON.parse(localStorage.getItem('scripts')) || [];
}

function loadScripts() {
  const scripts = getScripts();
  const list = document.getElementById('scriptsList');
  if(!list) return;

  if(scripts.length === 0) {
    list.innerHTML = '<div class="empty-state">Brak skryptów. Dodaj swój pierwszy skrypt!</div>';
    return;
  }

  list.innerHTML = scripts.map(script => `
    <div class="project-item">
      <h4>🛠 ${script.name} (${script.file}.html)</h4>
      <p>${script.desc}</p>
      <pre style="background: rgba(0,0,0,0.6); border-radius: 8px; padding: 12px; white-space: pre-wrap;">${escapeHtml(script.code)}</pre>
      <div class="project-actions">
        <button class="edit-btn" onclick="editScript('${script.id}')">✏️ Edytuj</button>
        <button class="delete-btn" data-id="${script.id}" onclick="deleteScriptByData(this)">🗑️ Usuń</button>
      </div>
    </div>
  `).join('');
}

function addScript() {
  const name = document.getElementById('scriptName').value.trim();
  const file = document.getElementById('scriptFile').value.trim();
  const desc = document.getElementById('scriptDesc').value.trim();
  const code = document.getElementById('scriptCode').value.trim();
  const editId = document.getElementById('editScriptId').value;

  if(!name || !desc || !code || !file) {
    showError('Wypełnij wszystkie pola skryptu!');
    return;
  }

  const scripts = getScripts();
  
  if(editId) {
    // Edit existing
    const script = scripts.find(s => s.id === editId);
    if(script) {
      script.name = name;
      script.file = file;
      script.desc = desc;
      script.code = code;
    }
    document.getElementById('editScriptId').value = '';
  } else {
    // Add new
    const newScript = {
      id: Date.now().toString(),
      name,
      file,
      desc,
      code,
      date: new Date().toLocaleDateString('pl-PL')
    };
    scripts.push(newScript);
  }
  
  localStorage.setItem('scripts', JSON.stringify(scripts));

  document.getElementById('scriptName').value = '';
  document.getElementById('scriptFile').value = '';
  document.getElementById('scriptDesc').value = '';
  document.getElementById('scriptCode').value = '';

  const scriptSuccess = document.getElementById('scriptSuccessMsg');
  scriptSuccess.textContent = editId ? '✅ Skrypt został zaktualizowany!' : '✅ Skrypt został dodany!';
  scriptSuccess.classList.add('show');
  setTimeout(() => scriptSuccess.classList.remove('show'), 3000);

  loadScripts();
}

function editScript(id) {
  const scripts = getScripts();
  const script = scripts.find(s => s.id === id);
  if(!script) return;
  document.getElementById('editScriptId').value = id;
  document.getElementById('scriptName').value = script.name;
  document.getElementById('scriptFile').value = script.file;
  document.getElementById('scriptDesc').value = script.desc;
  document.getElementById('scriptCode').value = script.code;
}

function deleteScript(id, showMsg = true) {
  console.log('Delete script called with id:', id);
  const scripts = getScripts();
  const updatedScripts = scripts.filter(s => s.id !== id);
  localStorage.setItem('scripts', JSON.stringify(updatedScripts));
  if(showMsg) showSuccess('✅ Skrypt został usunięty!');
  loadScripts();
}

async function saveScriptsFile(showNotification = true) {
  try {
    const scripts = getScripts();
    const data = JSON.stringify(scripts, null, 2);
    const blob = new Blob([data], {type: 'application/json'});

    if ('showSaveFilePicker' in window) {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'scripts.json',
        types: [{
          description: 'JSON file',
          accept: {'application/json': ['.json']}
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      if (showNotification) showSuccess('✅ Plik scripts.json został zapisany!');
    } else {
      // Fallback to download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'scripts.json';
      a.click();
      URL.revokeObjectURL(url);
      if (showNotification) showSuccess('✅ Plik scripts.json został pobrany!');
    }
  } catch (error) {
    console.error('Error saving file:', error);
    if (error && (error.name === 'AbortError' || error.name === 'SecurityError')) {
      return;
    }
    showError('Błąd podczas zapisywania pliku!');
  }
}

async function downloadAllDataFiles() {
  try {
    const projects = getProjects();
    const scripts = getScripts();

    downloadFile(new Blob([JSON.stringify(projects, null, 2)], { type: 'application/json' }), 'projects.json');
    downloadFile(new Blob([JSON.stringify(scripts, null, 2)], { type: 'application/json' }), 'scripts.json');

    showSuccess('✅ Pliki JSON zostały wygenerowane: projects.json i scripts.json');
  } catch (error) {
    console.error('Error exporting files:', error);
    showError('Błąd podczas eksportu plików JSON!');
  }
}

function deleteProjectByData(btn) {
  const id = btn.getAttribute('data-id');
  deleteProject(id);
}

function deleteScriptByData(btn) {
  const id = btn.getAttribute('data-id');
  deleteScript(id);
}

// GET PROJECTS
function getProjects() {
  return JSON.parse(localStorage.getItem('projects')) || [];
}

// LOAD PROJECTS
function loadProjects() {
  const projects = getProjects();
  const list = document.getElementById('projectsList');
  
  if(projects.length === 0) {
    list.innerHTML = '<div class="empty-state">Brak projektów. Dodaj swój pierwszy projekt!</div>';
    return;
  }
  
  list.innerHTML = projects.map(project => `
    <div class="project-item">
      <h4>${project.emoji} ${project.name}</h4>
      <p>${project.desc}</p>
      <p style="font-size: 0.85rem; color: #888; margin-bottom: 15px;">Dodano: ${project.date}</p>
      ${project.link ? `<p><a href="${project.link}" target="_blank" style="color: #ff6b35; text-decoration: none;">🔗 Otwórz Link</a></p>` : ''}

        <button class="edit-btn" onclick="editProject('${project.id}')">✏️ Edytuj</button>

}

// EDIT PROJECT
function editProject(id) {
  const projects = getProjects();
  const project = projects.find(p => p.id === id);
  
  if(!project) return;
  
  document.getElementById('editId').value = id;
  document.getElementById('projectEmoji').value = project.emoji;
  document.getElementById('projectName').value = project.name;
  document.getElementById('projectDesc').value = project.desc;
  document.getElementById('projectLink').value = project.link || '';
  
  document.querySelector('.add-project-form').scrollIntoView({ behavior: 'smooth' });
  // Nie usuwaj, tylko edytuj
}

// DELETE PROJECT
function deleteProject(id, showMsg = true) {
  console.log('Delete called with id:', id, 'showMsg:', showMsg);
  const projects = getProjects();
  console.log('Current projects:', projects);
  const updatedProjects = projects.filter(p => p.id !== id);
  console.log('Filtered projects:', updatedProjects);
  localStorage.setItem('projects', JSON.stringify(updatedProjects));
  if(showMsg) showSuccess('✅ Projekt został usunięty!');
  loadProjects();
}

function downloadFile(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function downloadAllDataFiles() {
  try {
    const projects = getProjects();
    const scripts = getScripts();

    downloadFile(new Blob([JSON.stringify(projects, null, 2)], { type: 'application/json' }), 'projects.json');
    downloadFile(new Blob([JSON.stringify(scripts, null, 2)], { type: 'application/json' }), 'scripts.json');

    showSuccess('✅ Pliki JSON zostały wygenerowane: projects.json i scripts.json');
  } catch (error) {
    console.error('Error exporting files:', error);
    showError('Błąd podczas eksportu plików JSON!');
  }
}

// Gradient z kursorem
document.addEventListener('mousemove', e => {
  const xPercent = (e.clientX / window.innerWidth) * 100;
  const yPercent = (e.clientY / window.innerHeight) * 100;
  document.body.style.backgroundPosition = `${xPercent}% ${yPercent}%`;
});

const themeToggle = document.getElementById('theme-toggle');
const themeWipe = document.getElementById('theme-wipe');

function setTheme(dark) {
  if (dark) {
    document.body.classList.add('dark-mode');
    themeToggle.textContent = '☀️';
    localStorage.setItem('theme', 'dark');
  } else {
    document.body.classList.remove('dark-mode');
    themeToggle.textContent = '🌙';
    localStorage.setItem('theme', 'light');
  }
}

function initTheme() {
  const theme = localStorage.getItem('theme');
  setTheme(theme === 'dark');
}

themeToggle.addEventListener('click', () => {
  const toDark = !document.body.classList.contains('dark-mode');
  themeWipe.classList.remove('slide-to-dark', 'slide-to-light');
  themeWipe.classList.add(toDark ? 'slide-to-dark' : 'slide-to-light');

  setTimeout(() => {
    setTheme(toDark);
  }, 250);

  themeWipe.addEventListener('animationend', () => {
    themeWipe.classList.remove('slide-to-dark', 'slide-to-light');
  }, { once: true });
});

document.addEventListener('DOMContentLoaded', initTheme);

// UTILITY FUNCTION
function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}
